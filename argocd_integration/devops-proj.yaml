apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: devops-project
  namespace: argocd

spec:
  description: Applications managed by DevOps users

  sourceRepos:
    - '*'

  destinations:
    - server: https://kubernetes.default.svc
      namespace: 'devops-*'

  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'
