apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: devops-health
  namespace: argocd

spec:
  project: devops-project

  source:
    repoURL: https://github.com/shfy70/argocd.git
    targetRevision: HEAD
    path: health-check

  destination:
    server: https://kubernetes.default.svc
    namespace: devops-health